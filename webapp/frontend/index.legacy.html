<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B1220" />
    <title>Football Ratings | European Club Ratings Explorer</title>
    <link rel="icon" href="/marble-mark.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
      :root {
        --bg: #0b1220;
        --surface: #111827;
        --surface-alt: #1e293b;

        --text: #f8fafc;
        --text-muted: #94a3b8;

        --primary: #1e3a5f;
        --primary-bright: #60a5fa;

        --accent: #d6a84f;
        --border: #334155;

        --danger: #dc2626;

        /* Derived tokens */
        --primary-soft: rgba(96, 165, 250, 0.14);
        --accent-soft: rgba(214, 168, 79, 0.14);
        --danger-soft: rgba(220, 38, 38, 0.15);
        --shadow: rgba(0, 0, 0, 0.35);
        --shadow-lg: rgba(0, 0, 0, 0.45);
        --radius: 14px;
        --radius-sm: 10px;
        --focus-ring: 0 0 0 2px var(--bg), 0 0 0 4px var(--primary-bright);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        overflow-x: hidden;
      }

      body {
        margin: 0;
        font-family: "DM Sans", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        font-optical-sizing: auto;
        background: var(--bg);
        background-image: radial-gradient(ellipse 120% 80% at 50% -30%, rgba(37, 99, 235, 0.18), transparent 55%);
        color: var(--text);
        line-height: 1.5;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* Skip link for keyboard users */
      .skip-link {
        position: absolute;
        left: -9999px;
        z-index: 100;
        padding: 10px 16px;
        background: var(--surface);
        color: var(--primary-bright);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        font-weight: 600;
      }
      .skip-link:focus {
        left: 16px;
        top: 16px;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 50;
        border-bottom: 1px solid var(--border);
        background: color-mix(in srgb, var(--surface) 92%, transparent);
        backdrop-filter: blur(12px);
      }

      .site-header-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .site-brand {
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: -0.02em;
        color: var(--text);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .site-brand:hover {
        color: var(--primary-bright);
      }

      .site-brand-mark {
        width: 32px;
        height: 32px;
        flex-shrink: 0;
        display: block;
        border-radius: 50%;
        object-fit: cover;
        filter: drop-shadow(0 0 12px rgba(96, 165, 250, 0.42));
      }

      .site-nav {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .site-nav a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        transition: color 0.15s ease, background 0.15s ease;
      }

      .site-nav a:hover {
        color: var(--text);
        background: var(--surface-alt);
      }

      .site-nav a:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      /* Full width of the content column — avoids 100vw breakout (scrollbar / horizontal overflow). */
      .map-full-width {
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
        padding: 0;
        margin-bottom: 20px;
      }

      .map-full-width .card {
        margin-bottom: 0;
      }

      .map-card-intro {
        text-align: center;
        max-width: 44rem;
        margin-left: auto;
        margin-right: auto;
      }

      .map-card-intro h2 {
        margin-bottom: 10px;
      }

      .map-card-intro .small {
        margin-bottom: 0;
      }

      .map-card-status {
        text-align: center;
        max-width: 48rem;
        margin: 14px auto 0;
      }

      /* Wide frame matches Europe’s bbox better than a tall box (less Plotly letterboxing). */
      .map-plot-host {
        width: 100%;
        max-width: 100%;
        aspect-ratio: 2.15 / 1;
        min-height: 340px;
        max-height: min(72vh, 780px);
        margin: 0 auto;
      }

      .map-plot-host .map-plot-fill {
        width: 100%;
        height: 100%;
        min-height: 280px;
      }

      .page-hero {
        margin-bottom: 24px;
        max-width: 52rem;
      }

      .page-hero h1 {
        margin-bottom: 10px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.5rem, 2.5vw, 1.85rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        color: var(--text);
        line-height: 1.2;
      }

      h2 {
        margin: 0;
      }

      .card {
        background: var(--surface);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        padding: 20px 22px;
        margin-bottom: 18px;
        box-shadow: 0 4px 24px var(--shadow);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .card:hover {
        border-color: color-mix(in srgb, var(--border) 70%, var(--primary));
      }

      .card h2 {
        margin: 0 0 14px;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      .card.card-muted {
        background: var(--surface-alt);
        border-style: dashed;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        align-items: end;
      }

      label {
        display: block;
        font-size: 0.8rem;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      select {
        width: 100%;
        padding: 11px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--surface-alt);
        color: var(--text);
        font-size: 0.9375rem;
        font-family: inherit;
        cursor: pointer;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      select:hover {
        border-color: color-mix(in srgb, var(--border) 50%, var(--text-muted));
      }

      select:focus {
        outline: none;
        border-color: var(--primary-bright);
        box-shadow: 0 0 0 3px var(--primary-soft);
      }

      a:not(.site-brand):not(.site-nav a):not(.skip-link):not(.link-btn) {
        color: var(--primary-bright);
        font-weight: 600;
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color 0.15s ease, color 0.15s ease;
      }

      a:not(.site-brand):not(.site-nav a):not(.skip-link):not(.link-btn):hover {
        border-bottom-color: var(--accent);
        color: var(--accent);
      }

      a:focus-visible {
        outline: none;
        border-radius: 4px;
        box-shadow: var(--focus-ring);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--border);
        padding: 12px 10px;
        text-align: left;
        font-size: 0.9rem;
      }

      th {
        background: var(--surface-alt);
        font-weight: 600;
        color: var(--text-muted);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      tbody tr {
        transition: background 0.12s ease;
      }

      tbody tr:hover td {
        background: rgba(37, 99, 235, 0.1);
      }

      tbody tr.click-row {
        cursor: pointer;
      }

      tbody tr.click-row:focus-visible {
        outline: none;
        box-shadow: inset 0 0 0 2px var(--primary-bright);
      }

      .small {
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .error {
        color: var(--danger);
        font-weight: 600;
        border-color: color-mix(in srgb, var(--danger) 45%, var(--border));
        background: var(--danger-soft);
      }

      .page-nav {
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      /* Pill buttons for in-app navigation (map ↔ country ↔ club); not default text links. */
      a.link-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 14px;
        font-size: 0.875rem;
        font-weight: 600;
        line-height: 1.25;
        color: var(--text) !important;
        background: var(--surface-alt);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        text-decoration: none !important;
        border-bottom: none !important;
        box-shadow: 0 1px 2px var(--shadow);
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          color 0.15s ease,
          box-shadow 0.15s ease,
          transform 0.12s ease;
      }

      a.link-btn:hover {
        background: color-mix(in srgb, var(--primary) 22%, var(--surface-alt));
        border-color: color-mix(in srgb, var(--primary-bright) 38%, var(--border));
        color: var(--primary-bright) !important;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px var(--shadow);
      }

      a.link-btn:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      a.link-btn--primary {
        background: var(--primary-soft);
        border-color: color-mix(in srgb, var(--primary-bright) 42%, var(--border));
        color: var(--primary-bright) !important;
      }

      a.link-btn--primary:hover {
        background: color-mix(in srgb, var(--primary-bright) 24%, var(--surface-alt));
        border-color: var(--primary-bright);
        color: var(--accent) !important;
      }

      a.link-btn.link-btn--header {
        padding: 7px 13px;
        font-size: 0.8125rem;
        font-weight: 600;
        box-shadow: none;
        background: color-mix(in srgb, var(--surface-alt) 55%, transparent);
        border-color: color-mix(in srgb, var(--border) 90%, transparent);
      }

      a.link-btn.link-btn--header:hover {
        transform: none;
        background: var(--surface-alt);
        box-shadow: 0 1px 3px var(--shadow);
      }

      .card.error a.link-btn {
        background: color-mix(in srgb, var(--bg) 55%, var(--surface-alt));
        border-color: color-mix(in srgb, var(--danger) 28%, var(--border));
      }

      .card.error a.link-btn:hover {
        background: color-mix(in srgb, var(--danger) 12%, var(--surface-alt));
        border-color: color-mix(in srgb, var(--danger) 40%, var(--border));
      }

      .table-scroll {
        max-height: min(70vh, 720px);
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: color-mix(in srgb, var(--bg) 40%, var(--surface));
      }

      .table-scroll table {
        margin-bottom: 0;
      }

      .table-scroll thead th {
        position: sticky;
        top: 0;
        z-index: 1;
        box-shadow: 0 1px 0 var(--border);
      }

      .th-sort-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin: 0;
        padding: 0;
        border: none;
        background: none;
        font: inherit;
        font-weight: 600;
        color: inherit;
        cursor: pointer;
        text-align: left;
      }

      .th-sort-btn:hover {
        color: var(--primary-bright);
      }

      .th-sort-btn:focus-visible {
        outline: 2px solid var(--primary-bright);
        outline-offset: 2px;
        border-radius: 4px;
      }

      .th-sort-indicator {
        font-size: 0.7rem;
        opacity: 0.55;
      }

      .club-extremes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 18px;
      }

      .numeric-pos {
        color: var(--primary-bright);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .numeric-neg {
        color: #f87171;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      code {
        font-family: ui-monospace, "Cascadia Code", "Segoe UI Mono", monospace;
        font-size: 0.84em;
        padding: 2px 8px;
        border-radius: 6px;
        background: var(--surface-alt);
        border: 1px solid var(--border);
        color: var(--accent);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        border: 1px solid var(--border);
        white-space: nowrap;
      }

      .badge-domestic {
        background: rgba(148, 163, 184, 0.12);
        color: var(--text-muted);
        border-color: color-mix(in srgb, var(--border) 80%, var(--text-muted));
      }

      .badge-uefa {
        background: var(--accent-soft);
        color: var(--accent);
        border-color: color-mix(in srgb, var(--accent) 35%, var(--border));
      }

      .badge-default {
        background: var(--surface-alt);
        color: var(--text-muted);
      }

      .loading-pulse {
        animation: pulse 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }

      .kbd-hint {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 8px;
      }

      .contact-card .contact-form {
        position: relative;
      }

      .contact-card .contact-form .field {
        margin-bottom: 14px;
      }

      .contact-card .contact-form label {
        margin-bottom: 6px;
      }

      .contact-card .contact-form input[type="text"],
      .contact-card .contact-form input[type="email"],
      .contact-card .contact-form textarea {
        width: 100%;
        padding: 11px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--surface-alt);
        color: var(--text);
        font-size: 0.9375rem;
        font-family: inherit;
      }

      .contact-card .contact-form textarea {
        min-height: 120px;
        resize: vertical;
      }

      .contact-card .contact-form input:focus,
      .contact-card .contact-form textarea:focus {
        outline: none;
        border-color: var(--primary-bright);
        box-shadow: 0 0 0 3px var(--primary-soft);
      }

      .contact-card .hp-field {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .contact-send {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 18px;
        margin-top: 4px;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        color: var(--primary-bright);
        background: var(--primary-soft);
        border: 1px solid color-mix(in srgb, var(--primary-bright) 42%, var(--border));
        border-radius: var(--radius-sm);
        box-shadow: 0 1px 2px var(--shadow);
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          color 0.15s ease,
          opacity 0.15s ease;
      }

      .contact-send:hover:not(:disabled) {
        background: color-mix(in srgb, var(--primary-bright) 24%, var(--surface-alt));
        border-color: var(--primary-bright);
        color: var(--accent);
      }

      .contact-send:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      .contact-send:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .contact-success {
        font-weight: 600;
        color: var(--accent);
      }

      .rank-cell {
        display: inline-block;
        min-width: 1.75rem;
        margin-right: 10px;
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        color: var(--text-muted);
      }

      .rating-strong {
        font-variant-numeric: tabular-nums;
        font-weight: 600;
        color: var(--primary-bright);
      }

      .sub-head {
        font-size: 1rem;
        font-weight: 500;
        color: var(--text-muted);
        margin: 0 0 4px;
        letter-spacing: 0.02em;
      }

      @media (max-width: 640px) {
        .site-header-inner {
          padding: 12px 16px;
        }
        .container {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div id="root"></div>
    <!-- Bump ?v= when app.jsx behavior changes — browsers aggressively cache script URLs otherwise. -->
    <script type="text/babel" src="/assets/app.jsx?v=20260502dual-top25"></script>
  </body>
</html>
