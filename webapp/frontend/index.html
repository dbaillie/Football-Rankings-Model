<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>European Football Glicko-2 Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
      /* Light theme: “Stadium daylight” */
      :root {
        --bg-page: #f0f2f5;
        --bg-card: #ffffff;
        --bg-muted: #eef1f5;
        --bg-table-head: #e8ecf2;
        --text: #121826;
        --text-muted: #5c6778;
        --border: #dde3eb;
        --primary: #1e5eff;
        --primary-soft: #e8eeff;
        --accent: #e85d04;
        --accent-soft: #fff4ed;
        --success: #0f766e;
        --danger: #b91c1c;
        --shadow: rgba(18, 24, 38, 0.07);
        --radius: 12px;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--bg-page);
        color: var(--text);
        line-height: 1.45;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      /* Break out of narrow container so the map spans the viewport */
      .map-full-width {
        width: 100vw;
        position: relative;
        left: 50%;
        transform: translateX(-50%);
        box-sizing: border-box;
        padding: 0 clamp(16px, 3vw, 40px);
        margin-bottom: 16px;
      }

      .map-full-width .card {
        margin-bottom: 0;
      }

      /* Wrapper measured for Plotly width; figure height comes from layout.height */
      .map-plot-host {
        width: 100%;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.65rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      .card {
        background: var(--bg-card);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        padding: 18px 20px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px var(--shadow);
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 1.15rem;
        font-weight: 650;
        color: var(--text);
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px;
      }

      label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 6px;
        font-weight: 600;
        color: var(--text);
      }

      select {
        width: 100%;
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text);
        font-size: 0.92rem;
      }

      select:focus {
        outline: 2px solid var(--primary);
        outline-offset: 1px;
        border-color: var(--primary);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--border);
        padding: 10px 8px;
        text-align: left;
        font-size: 0.92rem;
      }

      th {
        background: var(--bg-table-head);
        font-weight: 600;
        color: var(--text);
      }

      tbody tr:hover td {
        background: var(--primary-soft);
      }

      .small {
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .error {
        color: var(--danger);
        font-weight: 600;
        border-color: rgba(185, 28, 28, 0.35);
        background: #fef2f2;
      }

      .page-nav {
        margin-bottom: 8px;
      }

      .page-nav a {
        color: var(--primary);
        font-weight: 600;
        text-decoration: none;
        font-size: 0.95rem;
      }

      .page-nav a:hover {
        text-decoration: underline;
      }

      .table-scroll {
        max-height: min(70vh, 720px);
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      .table-scroll table {
        margin-bottom: 0;
      }

      .table-scroll thead th {
        position: sticky;
        top: 0;
        z-index: 1;
        box-shadow: 0 1px 0 var(--border);
      }

      .club-extremes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }

      .numeric-pos {
        color: var(--success);
        font-weight: 600;
      }

      .numeric-neg {
        color: var(--danger);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="/assets/app.jsx?v=20260202"></script>
  </body>
</html>
